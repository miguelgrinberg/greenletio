[testenv]
commands=
    pip install -e .
    pytest -p no:logging --cov=greenletio --cov-branch --cov-report=term-missing --cov-report=xml
deps=
    pytest
    pytest-cov
    psycopg2-binary

[testenv:flake8]
deps=
    flake8
commands=
    flake8 --exclude=".*" src/greenletio tests

[testenv:docs]
changedir=docs
deps=
    sphinx
allowlist_externals=
    make
commands=
    make html
